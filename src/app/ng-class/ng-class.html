<div class="row p-3">
  <div class="col-3" [ngClass] = "div1BgColor">div1</div>
  <div class="col-3" [ngClass] = "isChecked ? 'bg-success': 'bg-danger'">div2</div>
  <div class="col-3" [ngClass] = "div3Class">div3</div>
</div>

<div class="row p-3">
  <div class="col-3">
    <button class="btn btn-success" (click) = "addDiv1Color('bg-success')">add green</button>
    <button class="btn btn-danger" (click) = "addDiv1Color('bg-danger')">add red</button>
  </div>
  <div class="col-3">
    <input type="checkbox" [(ngModel)]="isChecked" />
    --{{ isChecked }}
  </div>
  <div class="col-3">
    <input type="text" [(ngModel)]="div3Class">
  </div>
</div>
