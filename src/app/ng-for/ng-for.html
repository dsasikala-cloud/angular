
<div class="row">
    <div class="col-3">
        <ul>
            <li *ngFor="let city of cityList">{{ city }}</li>
        </ul>
    </div>
    <div class="col-3">
        <button class="bg-success mx-3" *ngFor= "let city of cityList">{{city}}</button>
    </div>
</div>

<div class="row">
    <div class="col-3">
        <select>
            <option *ngFor = "let emp of empList" [value] = "emp.id">{{ emp.name }}</option>
        </select>
    </div>
    <div class="col-5">
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>srno</th>
                    <th>name</th>
                    <th>city</th>
                    <th>attendance</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor = "let emp of empList; let srno = index">
                    <td>{{ srno+1 }} </td>
                    <td> {{ emp.name }} </td>
                    <td> {{ emp.city }} </td>
                    <td>
                        <app-progress-bar [progress]="emp.attendance"></app-progress-bar> 
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
