<p>customer works!</p>


<div class="row p-3">
    <div class="col-8">
        <div class="card">
            <div class="card-header bg-warning">
                <h4>customer list</h4>
                <button class="btn btn-success" (click) = "getcustomerObj()">load</button>
            </div>
            <div class="card-body">
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Sr No</th>
                            <th>UserName</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        @for (customer of customerArray; track $index) {
                            <tr>
                                <td>{{$index + 1}}</td>
                                <td>{{customer.username}}</td>
                                <td>{{customer.firstName}}</td>
                                <td>{{customer.phone}}</td>
                                <td>{{customer.email}}</td>
                               
                                <td>
                                    <button class="btn btn-success">add</button>
                                </td>
                            </tr>
                        }
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="col-4">
        <div class="card">
            <div class="card-header bg-warning">
                <h4>new customer form</h4>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-6">
                        <label for="">Name</label>
                        <input type="text" [(ngModel)] = "customerObj.firstName" class="form-control">
                    </div>
                    <div class="col-6">
                        <label for="">UserName</label>
                        <input type="text" [(ngModel)] = "customerObj.username" class="form-control">
                    </div>
                    <div class="col-6">
                        <label for="">Phone</label>
                        <input type="text" [(ngModel)] = "customerObj.phone" class="form-control">
                    </div>
                    <div class="col-6">
                        <label for="">Email</label>
                        <input type="text" [(ngModel)] = "customerObj.email" class="form-control">
                    </div>
                </div>
                <div class="row pt-2">
                    <div class="col-6 text-center">
                        <button class="btn btn-secondary">reset</button>
                    </div>
                    <div class="col-6 text-center">
                        <button class="btn btn-success" (ngSubmit) = "saveCustomer()">save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
