<p>post-api works!</p>

<div class="row">
  <div class="col-12">
    <app-tabs [tabList] = "userTabs" (onTabClicked) = "onTabChange($event)"></app-tabs>
  </div>
</div>
--{{ currentTab }}

<div class="container mt-4">
  <div class="row">
    @if(currentTab == "userList") {
      <div class="col-7">
        <button class="btn btn-success" (click) = "getUsers()">load user data</button>
      <div class="card">
        <div class="card-header bg-warning fw-bold">
          User List
        </div>

        <div class="card-body p-0">
          <table class="table table-bordered m-0">
            <thead>
              <tr>
                <th>Sr No</th>
                <th>Name</th>
                <th>Company</th>
                <th>Username</th>
                <th>Email</th>
                <th>Phone</th>
              </tr>
            </thead>

            <tbody>
              @for(user of userList; track $index) {
                <tr>
                    <td>{{ $index + 1 }}</td>
                    <td>{{ user.name }}</td>
                    <td>{{ user.company }}</td>
                    <td>{{ user.username }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.phone }}</td>
                </tr>
              }
            </tbody>

          </table>
        </div>
      </div>
    </div>
    }
    @else {
      <div class="col-5">
      <div class="card">
        <div class="card-header bg-warning fw-bold">
          Create New User
        </div>

        <div class="card-body">

          <form>

              <div class="col-6">
                <label>Name</label>
                <input type="text" [(ngModel)] = "userObj.name" name="name" class="form-control" placeholder="Enter name">
              </div>

            <div class="row mb-2">
              <div class="col-6">
                <label>UserName</label>
                <input type="text" [(ngModel)] = "userObj.username" name="username" class="form-control" placeholder="Enter username">
              </div>

              <div class="col-6">
                <label>Company</label>
                <input type="text" [(ngModel)] = "userObj.company" name="company" class="form-control" placeholder="Enter company">
              </div>
            </div>

            <div class="row mb-2">
              <div class="col-6">
                <label>Email</label>
                <input type="text" [(ngModel)] = "userObj.email" name="email" class="form-control" placeholder="Enter email">
              </div>

              <div class="col-6">
                <label>Phone</label>
                <input type="text" [(ngModel)] = "userObj.phone" name="phone" class="form-control" placeholder="Enter phone no">
              </div>
            </div>

            <div class="text-end">
              <button type="reset" class="btn btn-secondary me-2">
                Reset Form
              </button>

              <button type="button" class="btn btn-success" (click) = "saveUser()">
                Save User
              </button>
            </div>

          </form>

        </div>
      </div>
    </div>
    }
    

  </div>
</div>
