<p>get-api works!</p>

<div class="row">
  <div class="col-3">
    <button class="btn btn-success" (click)="getUsers()">load users</button>
  </div>
</div>

<div class="row">
  <div class="col-6">
    <table class="table table-bordered">
      <thead>
        <tr>
          <th>srno</th>
          <th>name</th>
          <th>company</th>
          <th>email</th>
          <th>state</th>
        </tr>
      </thead>
      <tbody>
        @for (user of userList; track $index) {
          <tr>
            <td>{{ $index + 1 }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.company }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.state }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
