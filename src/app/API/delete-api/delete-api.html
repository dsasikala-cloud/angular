<p>delete-api works!</p>

<div class="container-fluid mt-4">
  <div class="row">
    <div class="col-6">
      <button class="btn btn-success" (click)="getUsers()">load user data</button>
      <div class="card">
        <div class="card-header bg-warning fw-bold">User List</div>

        <div class="card-body p-0">
          <table class="table table-bordered m-0">
            <thead>
              <tr>
                <th>Sr No</th>
                <th>Name</th>
                <th>Username</th>
                <th>Company</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Actions</th>
              </tr>
            </thead>

            <tbody>
              @for (user of userList; track $index) {
                <tr>
                  <td>{{ $index + 1 }}</td>
                  <td>{{ user.name }}</td>
                  <td>{{ user.username }}</td>
                  <td>{{ user.company }}</td>
                  <td>{{ user.email }}</td>
                  <td>{{ user.phone }}</td>
                  <td>
                    <button class="btn btn-success" (click)="onEdit(user)">edit</button>
                    <button class="btn btn-danger" (click)="onDelete(user.id)">delete</button>
                  </td>
                </tr>
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="col-1"></div>

    <!-- RIGHT SIDE → FORM -->
    <div class="col-5">
      <div class="card">
        <div class="card-header bg-warning fw-bold">Create New User</div>

        <div class="card-body">
          <form>
            <div class="row mb-2">
              <div class="col-6">
                <label>Name</label>
                <input
                  type="text"
                  [(ngModel)]="userObj.name"
                  name="name"
                  class="form-control"
                  placeholder="Enter name"
                />
              </div>
            </div>

            <div class="row mb-2">
              <div class="col-6">
                <label>Username</label>
                <input
                  type="text"
                  [(ngModel)]="userObj.username"
                  name="username"
                  class="form-control"
                  placeholder="Enter username"
                />
              </div>

              <div class="col-6">
                <label>Company</label>
                <input
                  type="text"
                  [(ngModel)]="userObj.company"
                  name="company"
                  class="form-control"
                  placeholder="Enter company"
                />
              </div>
            </div>

            <div class="row mb-2">
              <div class="col-6">
                <label>Email</label>
                <input
                  type="text"
                  [(ngModel)]="userObj.email"
                  name="email"
                  class="form-control"
                  placeholder="Enter email"
                />
              </div>

              <div class="col-6">
                <label>Phone</label>
                <input
                  type="text"
                  [(ngModel)]="userObj.phone"
                  name="phone"
                  class="form-control"
                  placeholder="Enter phone no"
                />
              </div>
            </div>

            <div class="text-end">
              <button type="reset" class="btn btn-secondary me-2">Reset Form</button>
              --{{ userObj.id }}

              @if (userObj.id == 0) {
                <button type="button" class="btn btn-success" (click)="saveUser()">Save User</button>
              } @else {
                <button type="button" class="btn btn-primary" (click)="updateUser()">
                  Update User
                </button>
              }
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
