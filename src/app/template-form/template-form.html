<div class="container pt-5">
    <h2>User Form</h2>
  <form #form="ngForm" class="row g-3 needs-validation" novalidate>
    <div class="col-md-4">
      <label >First name <span class="text-danger">*</span></label>
      <input type="text" class="form-control" #fname="ngModel" required name="firstname" [(ngModel)] = "user.firstName"/>
      <div class="text-danger">
        @if(fname.errors ?. ['required'] && fname.touched &&fname.dirty) {
            <span>this is required</span>
        }
      </div>
    </div>
    <div class="col-md-4">
      <label >Last name</label>
      <input type="text" class="form-control" #lname="ngModel" required minlength= "4" name="lastname" [(ngModel)] = "user.lastName"/>
      <div class="text-danger">
        <span *ngIf="lname.errors?.['required'] && lname.touched">this is required</span>
        <span *ngIf="lname.errors?.['minlength'] && lname.touched">min 4 required</span>
      </div>
    </div>
    <div class="col-md-4">
      <label  >Username</label>
      <div class="input-group has-validation">
        <span class="input-group-text" id="inputGroupPrepend">@</span>
        <input
          type="text"
          class="form-control"
          id="validationCustomUsername"
          name="userName"
          [(ngModel)] = "user.userName"
          aria-describedby="inputGroupPrepend"
          required
        />
        <div class="invalid-feedback">Please choose a username.</div>
      </div>
    </div>
    <div class="col-md-6">
      <label>City</label>
      <input type="text" class="form-control" name="city" [(ngModel)] = "user.city"/>
      <div class="invalid-feedback">Please provide a valid city.</div>
    </div>
    <div class="col-md-3">
      <label>State</label>
      <select class="form-select" name="state" [(ngModel)] = "user.state">
        <option selected disabled value="">Choose...</option>
        <option value="ap">andhra pradesh</option>
        <option value="ts">telangana</option>
        <option value="tn">tamil nadu</option>
      </select>
      <div class="invalid-feedback">Please select a valid state.</div>
    </div>
    <div class="col-md-3">
      <label >Zip</label>
      <input type="text" class="form-control" name="zip" [(ngModel)] = "user.zip"/>
      <div class="invalid-feedback">Please provide a valid zip.</div>
    </div>
    <div class="col-12">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="isTermsAgreed" [(ngModel)] = "user.isTermsAgreed"/>
        <label class="form-check-label" for="invalidCheck"> Agree to terms and conditions </label>
        <div class="invalid-feedback">You must agree before submitting.</div>
      </div>
    </div>
    <div class="col-12">
      <button class="btn btn-primary" [disabled] = "form.invalid" type="button" (click)="onSave()">Submit form</button>
    </div>
  </form>
</div>
